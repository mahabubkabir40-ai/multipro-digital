name: SEO Auto-Indexing

on:
  push:
    branches:
      - main  # Triggers whenever you push changes to the main branch

jobs:
  auto-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Create Google Auth File
        run: echo '${{ secrets.GOOGLE_INDEXING_KEY }}' > google-indexing-key.json

      - name: 🚀 Submit to Bing IndexNow
        run: npm run index-bing

      - name: 🚀 Submit to Google Indexing API
        run: npm run index-google
